<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 100"
  role="img"
>
  <title>FINVA Logo Mark</title>
  <desc>FINVA Navigator x Network mark — light theme. Compass ring with Neural F; AI (orange), FA (dark), Client (hollow) relationship nodes.</desc>

  <!--
    FINVA LOGO MARK — Light Theme (matches site palette)
    =====================================================
    Background: transparent — sits on Canvas Cream (#F3F0EE) sidebar
    Accent:     Signal Orange #F37338 / #CF4500
    Ink:        #141413 (dark strokes, ring, F backbone)
    Muted:      #D1CDC7 (Dust Taupe — minor ticks, grid)

    NODE MEANINGS:
    ✦ Orange (74, 22)  = AI Intelligence  — brightest, largest glow
    ● Dark  (58, 50)   = FA Advisor       — solid ink, the bridge
    ○ Hollow (26, 78)  = Client           — open/receptive, the purpose

    LAYER GUIDE (Figma):
    layer-grid          → faint crosshairs
    layer-radar-wedge   → NE sector orange fill
    layer-inner-rings   → dashed concentric rings
    layer-compass-ring  → outer ring + 8 cardinal ticks
    layer-relationship  → dashed orange triangle AI↔FA↔Client
    layer-f-backbone    → the F strokes (ink)
    node-client         → hollow dark node
    node-fa             → solid dark node (FA)
    node-ai             → orange node (AI)
    layer-ne-bearing    → orange dot on NE ring
  -->

  <!-- ═══════════════════════════════════════ -->
  <!-- GRID — faint crosshairs                -->
  <!-- ═══════════════════════════════════════ -->
  <g id="layer-grid" stroke="#D1CDC7" stroke-width=".6" stroke-opacity=".55">
    <line x1="50" y1="7"    x2="50"   y2="93"/>
    <line x1="7"  y1="50"   x2="93"   y2="50"/>
    <line x1="19.6" y1="19.6" x2="80.4" y2="80.4"/>
    <line x1="80.4" y1="19.6" x2="19.6" y2="80.4"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- RADAR WEDGE — N→NE sector              -->
  <!-- ═══════════════════════════════════════ -->
  <g id="layer-radar-wedge">
    <path d="M 50,50 L 50,7 A 43,43 0 0,1 80.4,19.6 Z"
          fill="#F37338" fill-opacity=".07"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- INNER RINGS — dashed concentric        -->
  <!-- ═══════════════════════════════════════ -->
  <g id="layer-inner-rings" fill="none">
    <circle cx="50" cy="50" r="14"
            stroke="#D1CDC7" stroke-width=".55"
            stroke-dasharray="1,2.2" stroke-opacity=".7"/>
    <circle cx="50" cy="50" r="28"
            stroke="#D1CDC7" stroke-width=".7"
            stroke-dasharray="1.5,2.5" stroke-opacity=".7"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- COMPASS RING                           -->
  <!-- ═══════════════════════════════════════ -->
  <g id="layer-compass-ring">
    <!-- Main ring -->
    <circle cx="50" cy="50" r="43"
            fill="none" stroke="#141413" stroke-width="1.6" stroke-opacity=".18"/>

    <!-- Cardinal ticks -->
    <g id="ticks" stroke-linecap="round">
      <!-- N — prominent ink -->
      <line x1="50"   y1="7"    x2="50"   y2="15.5"
            stroke="#141413" stroke-width="2"   stroke-opacity=".45"/>
      <!-- E, S, W — muted -->
      <line x1="93"   y1="50"   x2="84.5" y2="50"
            stroke="#D1CDC7" stroke-width="1.5" stroke-opacity=".9"/>
      <line x1="50"   y1="93"   x2="50"   y2="84.5"
            stroke="#D1CDC7" stroke-width="1.5" stroke-opacity=".9"/>
      <line x1="7"    y1="50"   x2="15.5" y2="50"
            stroke="#D1CDC7" stroke-width="1.5" stroke-opacity=".9"/>
      <!-- NW, SE, SW — faint -->
      <line x1="19.6" y1="19.6" x2="25.8" y2="25.8"
            stroke="#D1CDC7" stroke-width="1.1" stroke-opacity=".75"/>
      <line x1="80.4" y1="80.4" x2="74.2" y2="74.2"
            stroke="#D1CDC7" stroke-width="1.1" stroke-opacity=".65"/>
      <line x1="19.6" y1="80.4" x2="25.8" y2="74.2"
            stroke="#D1CDC7" stroke-width="1.1" stroke-opacity=".65"/>
      <!-- NE — Signal Orange: AI intelligence bearing -->
      <line x1="80.4" y1="19.6" x2="72.8" y2="27.2"
            stroke="#F37338" stroke-width="2.8" stroke-opacity=".9"/>
    </g>

    <!-- N label -->
    <text x="50" y="5.8" text-anchor="middle"
          font-size="6.5" fill="#141413"
          font-family="Courier New, Courier, monospace"
          font-weight="700" fill-opacity=".4">N</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- RELATIONSHIP TRIANGLE                  -->
  <!-- AI ↔ FA ↔ Client                      -->
  <!-- ═══════════════════════════════════════ -->
  <g id="layer-relationship">
    <!-- AI → FA -->
    <line x1="74" y1="22" x2="58" y2="50"
          stroke="#CF4500" stroke-width="1.2"
          stroke-opacity=".35" stroke-dasharray="2.5,2"/>
    <!-- FA → Client -->
    <line x1="58" y1="50" x2="26" y2="78"
          stroke="#CF4500" stroke-width="1.2"
          stroke-opacity=".35" stroke-dasharray="2.5,2"/>
    <!-- AI → Client (direct, thinner) -->
    <line x1="74" y1="22" x2="26" y2="78"
          stroke="#CF4500" stroke-width=".8"
          stroke-opacity=".18" stroke-dasharray="3,2.5"/>
    <!-- AI bearing: node to NE ring tick -->
    <line x1="74" y1="22" x2="80.4" y2="19.6"
          stroke="#F37338" stroke-width="1.4"
          stroke-opacity=".55" stroke-dasharray="1.5,1.5"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- F BACKBONE — dark ink strokes          -->
  <!-- ═══════════════════════════════════════ -->
  <g id="layer-f-backbone"
     stroke="#141413" stroke-width="7" stroke-linecap="round" stroke-opacity=".75">
    <line x1="26" y1="22" x2="26" y2="78"/>
    <line x1="26" y1="22" x2="74" y2="22"/>
    <line x1="26" y1="50" x2="58" y2="50"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- CLIENT NODE — hollow, the recipient    -->
  <!-- ═══════════════════════════════════════ -->
  <g id="node-client">
    <circle cx="26" cy="78" r="5.5"
            fill="#F3F0EE" stroke="#141413" stroke-width="2.2" stroke-opacity=".65"/>
    <circle cx="26" cy="78" r="1.8"
            fill="#141413" fill-opacity=".3"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- FA NODE — solid dark ink, the bridge   -->
  <!-- ═══════════════════════════════════════ -->
  <g id="node-fa">
    <!-- Subtle halo -->
    <circle cx="58" cy="50" r="9" fill="#141413" fill-opacity=".05"/>
    <!-- Main node -->
    <circle cx="58" cy="50" r="5.5" fill="#141413" fill-opacity=".72"/>
    <!-- Highlight -->
    <circle cx="58" cy="50" r="2.2" fill="#FFFFFF" fill-opacity=".35"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- AI NODE — Signal Orange, intelligence  -->
  <!-- ═══════════════════════════════════════ -->
  <g id="node-ai">
    <!-- Glow layers -->
    <circle cx="74" cy="22" r="16"  fill="#F37338" fill-opacity=".04"/>
    <circle cx="74" cy="22" r="12"  fill="#F37338" fill-opacity=".08"/>
    <circle cx="74" cy="22" r="9"   fill="#F37338" fill-opacity=".15"/>
    <circle cx="74" cy="22" r="7"   fill="#F37338" fill-opacity=".22"/>
    <!-- Main node -->
    <circle cx="74" cy="22" r="5.5" fill="#F37338"/>
    <!-- Bright core -->
    <circle cx="74" cy="22" r="2.2" fill="#FFFFFF" fill-opacity=".85"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- NE BEARING DOT on ring                 -->
  <!-- ═══════════════════════════════════════ -->
  <g id="layer-ne-bearing">
    <circle cx="80.4" cy="19.6" r="5"   fill="#F37338" fill-opacity=".15"/>
    <circle cx="80.4" cy="19.6" r="3.5" fill="#F37338" fill-opacity=".28"/>
    <circle cx="80.4" cy="19.6" r="2.2" fill="#F37338"/>
  </g>

</svg>
